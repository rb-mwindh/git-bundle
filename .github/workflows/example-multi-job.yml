name: Multi-Job Git Bundle Example

on:
  workflow_dispatch:


jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup git-bundle
        uses: ./

      - name: Compute next version
        id: compute
        run: |
          VERSION="99.0.0"  # In real scenario, compute this based on commits or other logic
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        run: |
          git config user.name "Test User"
          git config user.email "test@example.com"
          git commit --allow-empty -m "1"
          git commit --allow-empty -m "2"
          git tag v${{steps.compute.outputs.version}}

  build:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup git-bundle
        uses: ./

      - name: Verify history
        run: |
          git log --oneline --decorate --graph --all

      - name: Run build
        run: |
          git config user.name "Test User"
          git config user.email "test@example.com"
          git commit --allow-empty -m "3"
          git tag -f v${{needs.prepare.outputs.version}}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup git-bundle
        uses: ./

      - name: Verify released version
        run: |
          echo "Current commit:"
          git rev-parse HEAD
          echo "Available tags:"
          git tag -l
          echo "Latest tag:"
          git describe --tags --abbrev=0
